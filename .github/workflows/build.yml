name: Build ServiceGuard EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # อัปเดตเป็น v4

      - name: Set up Python
        uses: actions/setup-python@v5 # อัปเดตเป็น v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --uac-admin --name "ServiceGuard" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # อัปเดตเป็น v4 (ตัวที่แจ้ง Error ในรูป)
        with:
          name: ServiceGuard-Binary
          path: dist/ServiceGuard.exe
